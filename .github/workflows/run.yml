name: Run Guest Generator

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours (optional)

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install requests psutil PyJWT protobuf aiohttp pycryptodome httpx
    
    - name: Run Generator
      run: python gen.py
    
    - name: Run Activator  
      run: python activator.py
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: generated-accounts
        path: |
          *.json
          *.txt
